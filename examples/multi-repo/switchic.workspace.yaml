# Example workspace manifest — copy to switchic.workspace.yaml in the parent
# directory of your repos, then run `switchic switch claude` from there.
name: billing-workspace
notes: Billing platform — API, web dashboard, and shared contracts.
platform: claude
workflow: coding

repos:
  - name: billing-api
    path: ../billing-api
    role: backend
    notes: REST API, owns user accounts and invoicing
    # context_file: optional — overrides the platform default (CLAUDE.md / AGENTS.md).
    # Use when the repo's context lives at a non-standard path, e.g.:
    # context_file: ../billing-api/docs/CLAUDE.md
  - name: billing-web
    path: ../billing-web
    role: frontend
    notes: Customer-facing dashboard (React)
  - name: billing-contracts
    path: ../billing-contracts
    role: contracts
    notes: Shared OpenAPI specs + generated client SDKs
    context_file: ../billing-contracts/docs/AGENTS.md

agents:
  active:
    - planner
    - builder

skills:
  active:
    - codegen
    - summarize

rules:
  active:
    - global

# Reference docs shared across the whole workspace. Paths are relative to
# this workspace file. The "when" field scopes the @-mention to a specific
# trigger so the AI only loads the doc when it is relevant.
docs:
  - path: docs/architecture.md
    when: understanding how the repos fit together
  - path: README.md
