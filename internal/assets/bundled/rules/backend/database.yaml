name: database
description: Database Coding & Querying Best Practices
content: |
  ## 1. Security & Injection Prevention
  - **Parameterized Queries:** Never concatenate strings to build SQL queries with user input. Always use parameterized queries (prepared statements) to entirely prevent SQL Injection (SQLi) vulnerabilities.
  - **Input Sanitization:** Even when using ORMs, validate and sanitize inputs (like sorting column names or dynamically generated table names) that cannot be parameterized.
  - **Principle of Least Privilege:** Ensure application code connects using database credentials that only have the permissions necessary for its function (e.g., read/write vs. schema alteration).

  ## 2. Query Performance & Efficiency
  - **Avoid SELECT \*:** Never use `SELECT *` in application code. Explicitly name the columns required by the business logic to reduce network payload sizes and leverage database covering indexes.
  - **N+1 Query Prevention:** When using an ORM, always eagerly load relationships (e.g., `preload`, `include`, or `join`) when fetching collections to prevent executing a separate query for each child record.
  - **Application-Side Pagination:** Never pull an entire table into application memory to paginate it. Always enforce database-level pagination using `LIMIT`/`OFFSET` or cursor-based pagination.
  - **Bulk Operations:** Use batch/bulk insert and update mechanisms instead of executing single insert/update queries inside loops.

  ## 3. Transaction Management
  - **Keep Transactions Short:** Keep database transactions as short as possible to prevent locking tables/rows and causing deadlocks. 
  - **No External I/O in Transactions:** Never make HTTP network calls, file system operations, or heavy computational tasks inside a database transaction block. Do them before or after.
  - **Explicit Rollbacks:** Ensure every transaction block has robust error handling that explicitly triggers a rollback if any step fails, leaving no partial state changes.

  ## 4. Connection Lifecycle & Resource Management
  - **Connection Pooling:** Always utilize a connection pool rather than opening and closing a new database connection for every incoming HTTP request. Configure pool limits (`max_connections`, `idle_timeout`) defensively.
  - **Resource Cleanup:** Always release or close database connections, statements, and cursors immediately after execution. In block-scoped environments, use language utilities (like `defer` in Go, `try-with-resources` in Java, or `async using` in TypeScript).

  ## 5. ORM vs. Raw SQL Guardrails
  - **Understand ORM Abstraction:** Rely on the ORM for standard CRUD operations, type safety, and basic relations. 
  - **Drop to Raw SQL for Complexity:** Do not force complex, multi-join, heavy analytical queries or window functions into convoluted ORM syntax. Drop down to raw, optimized SQL queries when the ORM's generated SQL becomes inefficient or unreadable.
  - **Monitor Generated SQL:** Periodically log and review the actual SQL statements generated by the ORM during local development to catch hidden performance traps.

  ## 6. Code-Driven Schema Migrations
  - **Version Controlled:** All schema changes must be driven by version-controlled migration files in the codebase, never executed manually in production environments.
  - **Idempotency:** Write migration scripts to be idempotent whenever possible (e.g., using `CREATE TABLE IF NOT EXISTS` or checking for column existence) so they can safely re-run if a deployment fails halfway through.
  - **Backward Compatibility:** Design migrations to be backward-compatible with the currently running application code to support zero-downtime, rolling deployments (e.g., add columns before removing them).
