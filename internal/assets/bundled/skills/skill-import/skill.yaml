name: skill-import
description: Convert a SKILL.md from any AI coding tool (Claude Code, Cursor, GitHub Copilot, Windsurf) into a switchic-compatible YAML skill definition, carrying over any sibling reference files and folders. Use when the user wants to migrate or reuse an existing skill inside switchic.

claude:
  argument-hint: "<skill-file-path> [output-path]"

prompt: |
  # Skill Import

  Convert a SKILL.md from any AI coding tool into the switchic YAML format so it can be
  registered as a bundled or project-local skill in switchic.

  All major AI coding tools follow the Agent Skills open standard (https://agentskills.io):
  skills are `SKILL.md` files with YAML frontmatter stored inside a named subdirectory.
  The platforms share the same core fields; differences are minor (see `formats.md`).

  ## Workflow

  Follow this sequence strictly:

  1. **Read the source file** — use the Read tool on the path the user provided.
  2. **Detect the source format** using the rules in `formats.md`.
  3. **Extract fields** according to the format's field mapping (see `formats.md`).
  4. **Map to switchic schema** (see Target Schema below).
  5. **Write the output** to the path the user specified, or default to `./skill.yaml` in the
     current directory if no output path was given.
  6. **Copy sibling files and folders** — see "Sibling files and folders" below.
  7. **Report** — after writing, print a one-paragraph summary: source platform detected, fields
     mapped, output path, sibling files/folders copied (if any), and any fields that had to be
     inferred, dropped, or left blank.

  ## Target Schema

  Every output file must be valid switchic YAML. Only include keys that have non-empty values.

  ```yaml
  name: kebab-case-name          # required; derive from directory or filename stem if not in frontmatter
  description: |                 # required; one sentence describing what the skill does and when to invoke it
    ...
  claude:                        # only when source is Claude Code; omit the block entirely if empty
    argument-hint: "[args]"      # optional; only when present in source
    disable-model-invocation: true  # optional; only when present in source
    allowed-tools: "Read Write"  # optional; only when present in source
  copilot:                       # only when source is GitHub Copilot or agentskills.io; omit if empty
    allowed-tools: "Bash Read"   # optional; only when present in source
    license: MIT                 # optional; only when present in source
    compatibility: "Requires git" # optional; only when present in source
    metadata:                    # optional; preserve key-value map verbatim
      key: value
  prompt: |                      # required; the full skill instruction body
    ...
  ```

  Rules:
  - `name` must be kebab-case (lowercase letters, digits, hyphens only; no leading/trailing/consecutive
    hyphens; max 64 chars per agentskills.io spec). Prefer the frontmatter `name` field; fall back
    to the skill directory name, then the filename stem. Strip spaces and platform-specific suffixes
    (`.md`, `.yaml`, `-skill`). Warn the user if the source name violates these constraints.
  - `description` is a single sentence that names the skill and states when an AI should invoke it.
    If the source has no description, synthesize one from the prompt body — do not leave it blank.
  - `prompt` must be the raw instruction text with no frontmatter artifacts or platform-specific
    decorators. See `formats.md` for per-platform cleanup rules.
  - Route platform-specific fields to the correct block — see `formats.md` for the exact mapping.
  - Do not add fields that are absent from the source unless the field is required.
  - Do not truncate the prompt. Preserve all original instructions verbatim.
  - Omit `claude:` entirely if no Claude-specific fields are present.
  - Omit `copilot:` entirely if no Copilot/agentskills.io-specific fields are present.

  ## Output path resolution

  1. If the user provided an explicit output path as the second argument, use it.
  2. If the user gave no output path but gave an input path, write to the same directory as the
     input file, naming the output `skill.yaml`.
  3. If neither is given, write `./skill.yaml` in the current working directory.

  Warn the user before overwriting an existing file at the target path. If overwriting, ask for
  confirmation unless the user has already said "yes" or "overwrite".

  ## Sibling files and folders

  Many skills are more than one file: `SKILL.md` links to reference docs sitting next to it
  (e.g. `templates.md`, `checklist.md`, `examples/`). switchic's skill loader supports this
  natively — anything placed alongside `skill.yaml` in a folder-based skill is picked up as an
  embedded file and shipped verbatim to every platform on `switch`. Carry those files over so
  the imported skill stays self-contained.

  1. List the source `SKILL.md`'s directory. Every other entry in it — files and folders alike
     — is a sibling to copy, except `SKILL.md` itself.
  2. Skip VCS/editor cruft that isn't part of the skill: `.git`, `.DS_Store`, editor swap files.
     Copy everything else, including files the prompt body doesn't explicitly link to — do not
     try to guess relevance from the prompt text.
  3. Copy each sibling recursively, preserving its relative path and directory structure, into
     the same directory that holds the output `skill.yaml` (not the current working directory —
     if the resolved output path is `./foo/skill.yaml`, siblings land under `./foo/`).
  4. Preserve file contents byte-for-byte — no reformatting, no frontmatter stripping. Only
     `SKILL.md`'s own content goes through the field-mapping/cleanup rules; siblings do not.
  5. If a sibling's destination path already exists, treat it the same as overwriting the output
     `skill.yaml`: warn and ask for confirmation unless the user already said "yes" or
     "overwrite".
  6. If the source has no siblings (a lone `SKILL.md`, or the input was pasted text with no
     backing directory), skip this step silently — do not report "0 files copied" as if it were
     notable.

  ## Multi-skill files

  If the source file contains multiple distinct skill blocks, ask the user:
  "This file contains multiple skill blocks. Convert to one combined skill, or split into
  separate YAML files (one per block)?"
  Default to combined if the user does not respond.

  ## Additional resources

  - Source format detection and field mapping: [formats.md](formats.md)
