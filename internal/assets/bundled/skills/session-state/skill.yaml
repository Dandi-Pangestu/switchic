name: session-state
description: |
  Defines the per-ticket workflow state file contract at generated-docs/<JIRA_KEY>/state.yaml;
  use when orchestrating a coding workflow to record phase transitions, resume interrupted
  sessions, and check on disk what work is already done before delegating.
prompt: |
  The workflow state for a ticket lives on disk, not in conversation memory. This makes
  sessions resumable and lets partial runs skip work that is already done.

  ## SESSION_ROOT

  `SESSION_ROOT` is the single anchor for all cross-session artifacts ‚Äî `generated-docs/`,
  `sessions/registry.json`, and `state.yaml` all live under it:

  - **Single-repo mode:** `SESSION_ROOT` = the repository root (`git rev-parse --show-toplevel`).
  - **Workspace mode** (a `switchic.workspace.yaml` exists at or above cwd): `SESSION_ROOT` =
    the directory containing `switchic.workspace.yaml`, NOT any individual repo.

  It is never inside a worktree ‚Äî artifacts must be visible from all sessions. Resolve it
  once at the start of a workflow and pass it explicitly to every agent and skill that reads
  or writes session artifacts.

  ## TICKET_DIR

  `TICKET_DIR` is where one ticket's artifacts (`state.yaml`, `implementation-plan.md`,
  `review-summary.md`) live:

  - **Single-repo mode:** `TICKET_DIR = <SESSION_ROOT>/generated-docs/<JIRA_KEY>`
  - **Workspace mode:** `TICKET_DIR = <SESSION_ROOT>/generated-docs/<JIRA_KEY>/<REPO_NAME>`
    where `REPO_NAME` is the basename of the target repo. A ticket that spans several repos
    gets one `TICKET_DIR` ‚Äî and one state file, plan, and review ‚Äî per repo, so sessions for
    the same ticket in different repos never overwrite each other.

  Resolve `TICKET_DIR` together with `SESSION_ROOT` and pass it to every agent that reads or
  writes ticket artifacts.

  ## Location

  `<TICKET_DIR>/state.yaml`

  ## Schema

  ```yaml
  ticket: QC-12345
  phase: planned            # see lifecycle below
  session_root: /abs/path/to/session/root
  repo_root: /abs/path/to/target/repo        # equals session_root in single-repo mode
  base_branch: production
  branch_name: feature/QC-12345-fix-nil-message-send
  worktree_path: /abs/path/of/this/session   # equals repo_root for the primary session
  plan:
    path: <TICKET_DIR>/implementation-plan.md
    status: draft           # draft | approved ‚Äî mirrors the plan file's frontmatter
    revision: 1
  review:
    iteration: 0            # number of completed implement‚Üíreview cycles
    verdict: null           # null | approved | needs_revision ‚Äî mirrors review-summary frontmatter
  updated_at: 2026-01-01T00:00:00Z
  ```

  ## Phase lifecycle

  `context` ‚Üí `planned` ‚Üí `approved` ‚Üí `implemented` ‚Üí `reviewed` ‚Üí `done`

  - `context` ‚Äî requirements fetched; session may or may not be bootstrapped yet
  - `planned` ‚Äî implementation plan written, awaiting human approval
  - `approved` ‚Äî human approved the plan; implementation may start
  - `implemented` ‚Äî code written, awaiting review (or re-review after revisions)
  - `reviewed` ‚Äî reviewer returned `approved`
  - `done` ‚Äî session closed (registry updated, worktree cleaned up if parallel)

  A revision loop moves `implemented` ‚Üí back to `implemented` with `review.iteration`
  incremented and `review.verdict: needs_revision` recorded in between.

  ## Rules

  1. **The orchestrating agent owns all writes** to `state.yaml`. Specialist agents read it
     (or receive its values as inputs) but never modify it.
  2. Update the file at every phase transition, plan revision, and review verdict ‚Äî in the
     same turn the event happens, not at the end of the workflow.
  3. On any request for a ticket, read `state.yaml` FIRST. If present, trust it over
     conversation memory and resume from the recorded phase.
  4. If `state.yaml` is missing but artifacts exist in `TICKET_DIR`, reconstruct conservatively:
     - `implementation-plan.md` with frontmatter `status: approved` ‚Üí phase `approved`
     - `implementation-plan.md` with `status: draft` (or no frontmatter) ‚Üí phase `planned`
     - `review-summary.md` with `verdict: approved` ‚Üí phase `reviewed`
     Then write the reconstructed `state.yaml` before proceeding.
  5. `plan.status` and `review.verdict` must mirror the frontmatter of the artifact files;
     the artifact frontmatter is authoritative if they ever disagree.
  6. Write atomically where possible (write then rename) and keep the file valid YAML.
