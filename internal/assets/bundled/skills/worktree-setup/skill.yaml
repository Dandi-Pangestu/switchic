name: worktree-setup
description: |
  Provisions a new git worktree at a sibling path of the repository root for a parallel agent
  session; use when starting an isolated parallel agent session branched off the latest base
  branch (default: production).
prompt: |
  To provision a parallel agent session worktree:

  ## Inputs

  You will receive the following from the invoking agent:
  - `JIRA_KEY` — the Jira ticket key (e.g. `QC-99999`)
  - `JIRA_TITLE_SLUG` — the Jira title slug: lowercase, hyphens only, max 6 words (e.g. `fix-nil-error-message-send`)
  - `REPO_ROOT` — absolute path to the target repository root (e.g. `/Users/you/my-repo`)
  - `BASE_BRANCH` _(optional)_ — the branch to base the feature branch on; defaults to `production` if omitted
  - `SESSION_ROOT` _(optional)_ — where session artifacts live; defaults to `REPO_ROOT`. In workspace mode, pass the workspace root (the directory containing `switchic.workspace.yaml`) so all sessions share one registry

  ## Steps

  1. Locate the script at `<SKILL_DIR>/scripts/worktree-setup.sh` where `<SKILL_DIR>` is the directory containing this skill definition.

  2. Ensure the script is executable:
     ```
     chmod +x <SKILL_DIR>/scripts/worktree-setup.sh
     ```

  3. Execute the script with the inputs as positional arguments:
     ```
     bash <SKILL_DIR>/scripts/worktree-setup.sh <JIRA_KEY> <JIRA_TITLE_SLUG> <REPO_ROOT> <BASE_BRANCH> <SESSION_ROOT>
     ```

  4. The script will output three lines to stdout:
     ```
     WORKTREE_PATH=<absolute-path>
     BRANCH_NAME=<branch-name>
     BASE_BRANCH=<base-branch-used>
     ```
     Parse these lines to extract the values and store them as session variables.

  5. Pass `WORKTREE_PATH`, `BRANCH_NAME`, and `BASE_BRANCH` to all downstream agents.

  ## Output

  Return to the invoking agent:
  - `WORKTREE_PATH` — absolute path of the provisioned worktree (sibling of `REPO_ROOT`, named `<repo-name>-session-<JIRA_KEY>`)
  - `BRANCH_NAME` — name of the newly created branch (e.g. `feature/QC-99999-fix-nil-message-send`)
  - `BASE_BRANCH` — the base branch the feature branch was created from

  ## Notes

  - The session registry lives at `<SESSION_ROOT>/sessions/registry.json`. The script creates it (as `[]`) if it does not exist and appends the new session entry (including `repo_root`, so cleanup knows which repo owns the worktree).
  - The script resolves symlinked repo paths to their physical location, so workspace repos symlinked under `repos/` get their worktree next to the real repository.
  - The script never modifies the primary checkout: it fetches `origin/<BASE_BRANCH>` and creates the worktree directly from it.

  ## Error Handling

  If the script exits non-zero, surface the full error output to the user immediately and halt. Do not continue the workflow.

  Common causes of failure:
  - `jq` is not installed — fix: `brew install jq`
  - `BASE_BRANCH` does not exist on `origin` — verify the branch name with the user
  - Worktree path already exists — user may need to run `@session-manager cleanup <KEY>` first
