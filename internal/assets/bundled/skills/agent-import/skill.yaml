name: agent-import
description: Convert an agent definition file from any AI coding platform (Claude Code, Cursor, GitHub Copilot) into a switchic-compatible YAML agent definition. Use when the user wants to migrate or reuse an existing agent inside switchic.

claude:
  argument-hint: "<agent-file-path> [output-path]"
  allowed-tools: "Read Write Bash(find *)"
copilot:
  allowed-tools: Bash Read Write
kiro:
  allowed-tools: read write shell

prompt: |
  # Agent Import

  Convert an agent definition file from any AI coding platform into the switchic YAML format
  so it can be registered as a bundled or project-local agent in switchic.

  Each platform stores agents as markdown files with YAML frontmatter inside a named directory.
  Platform field names differ (camelCase vs snake_case, different key names) — the mapping rules
  are in `formats.md`.

  ## Workflow

  Follow this sequence strictly:

  1. **Read the source file** — use the Read tool on the path the user provided.
  2. **Detect the source format** using the rules in `formats.md`.
  3. **Extract fields** according to the format's field mapping (see `formats.md`).
  4. **Map to switchic schema** (see Target Schema below).
  5. **Write the output** to the path the user specified, or default to `./agent.yaml` in the
     current directory if no output path was given (see Output path resolution).
  6. **Report** — after writing, print a one-paragraph summary: source platform detected, fields
     mapped, output path, and any fields that had to be inferred, dropped, or left blank.

  ## Target Schema

  Every output file must be valid switchic YAML. Only include keys that have non-empty values.

  ```yaml
  name: kebab-case-name          # required; derive from filename stem if not in frontmatter
  description: |                 # required; one sentence describing what the agent does and when to invoke it
    ...
  required_skills:               # optional; only when source has a skills list
    - skill-name
  instructions: |                # required; the full system prompt body
    ...
  claude:                        # only when source is Claude Code; omit the block entirely if empty
    tools:                       # optional array; only when present in source
      - Read
      - Write
    disallowed_tools:            # optional array; only when present in source
      - WebFetch
    model: sonnet                # optional; only when present in source
    permission_mode: acceptEdits # optional; only when present in source
    max_turns: 20                # optional; only when present in source
    effort: high                 # optional; only when present in source
    isolation: worktree          # optional; only when present in source
    background: true             # optional; only when present in source
    memory: project              # optional; only when present in source
    color: blue                  # optional; only when present in source
    initial_prompt: |            # optional; only when present in source
      ...
    mcp_servers:                 # optional; only when present in source
      - server-name
    hooks:                       # optional; only when present in source
      PreToolUse:
        - matcher: Bash
          hooks:
            - type: command
              command: ./scripts/validate.sh
  copilot:                       # only when source is GitHub Copilot; omit the block entirely if empty
    tools:                       # optional array of Copilot tool aliases/MCP tool names
      - execute
      - read
    target: github-copilot       # optional; only when present in source
    model: gpt-4o                # optional; only when present in source
    disable-model-invocation: true  # optional; omit if false
    user-invocable: false           # optional; omit if true (true is the default)
    mcp-servers:                    # optional; preserve YAML structure verbatim
      server-name:
        type: http
        url: https://...
    metadata:                       # optional; preserve key-value map verbatim
      key: value
  ```

  Rules:
  - `name` must be kebab-case. Prefer the frontmatter `name` field; fall back to the filename
    stem. For GitHub Copilot files, strip the `.agent.md` suffix before kebab-casing.
  - `description` is a single sentence that names the agent and states when an AI should delegate
    to it. If the source has no description, synthesize one from the instructions body — do not
    leave it blank.
  - `instructions` must be the raw body text with no frontmatter artifacts. See `formats.md` for
    per-platform cleanup rules.
  - For Claude sources: `tools` and `disallowed_tools` are comma-separated strings — split them
    into YAML arrays. `required_skills` maps from the `skills` field — split into an array.
  - For GitHub Copilot sources: `tools` is a YAML flow sequence `['a', 'b']` — parse and emit
    as a YAML array under `copilot.tools`. All other Copilot-specific fields go in `copilot:`.
  - Do not add fields that are absent from the source unless the field is required.
  - Do not truncate the instructions. Preserve all original content verbatim.
  - Omit the `claude:` block entirely if no Claude-specific fields are present.
  - Omit the `copilot:` block entirely if no Copilot-specific fields are present.

  ## Output path resolution

  1. If the user provided an explicit output path as the second argument, use it.
  2. If the user gave no output path but gave an input path, write to the same directory as the
     input file, naming the output `agent.yaml`.
  3. If neither is given, write `./agent.yaml` in the current working directory.

  Warn the user before overwriting an existing file at the target path. If overwriting, ask for
  confirmation unless the user has already said "yes" or "overwrite".

  ## Additional resources

  - Source format detection and field mapping: [formats.md](formats.md)
