name: implementation-plan
description: |
  Guide for producing structured implementation plans for Jira tickets, PRs, and similar
  requirements; use when synthesizing requirements, constraints, and acceptance criteria into
  a clear, actionable, and well-organized plan.
prompt: |
  To produce a high-quality implementation plan:

  1. Use clear headings and sections (e.g., High-Level Architecture, Key Tasks, Risks & Assumptions, Rollout).
  2. Include high-level architecture/design decisions.
  3. List key tasks and subtasks, sequenced by phases and dependencies.
  4. Address test adjustments or additions (e.g., RSpec, unit/integration tests).
  5. Highlight risks, assumptions, and open questions.
  6. Cover rollout/deployment considerations.
  7. Format for easy consumption by engineers and stakeholders.

  Example:

  ## High-Level Architecture
  - Use event-driven microservices
  - Integrate with external API via webhook

  ## Key Tasks
  1. Update domain model
  2. Implement webhook handler
  3. Add unit and integration tests

  ## Risks & Assumptions
  - External API reliability
  - Data consistency

  ## Rollout
  - Deploy to staging, verify integration, then production

  Agents should invoke this skill when tasked with producing implementation plans for Jira tickets, PRs, or similar requirements. Output must be structured, actionable, and ready for review or execution.
