name: worktree-cleanup
description: |
  Removes a git worktree created by the worktree-setup skill and deregisters its entry from
  the session registry. Use when cleaning up a completed or abandoned parallel agent session.
prompt: |
  To clean up a parallel agent session worktree:

  ## Inputs

  You will receive the following from the invoking agent:
  - `JIRA_KEY` — the Jira ticket key of the session to remove (e.g. `QC-99999`)
  - `REPO_ROOT` — absolute path to the primary repository root (e.g. `/Users/you/my-repo`)
  - `SESSION_ROOT` _(optional)_ — where session artifacts live; defaults to `REPO_ROOT`. In workspace mode, pass the workspace root (the directory containing `switchic.workspace.yaml`)
  - `FORCE` _(optional)_ — pass the literal string `force` ONLY after the user has explicitly confirmed discarding uncommitted changes in the worktree. Never pass it on the first attempt.

  ## Steps

  1. Locate the script at `<SKILL_DIR>/scripts/worktree-cleanup.sh` where `<SKILL_DIR>` is the directory containing this skill definition.

  2. Ensure the script is executable:
     ```
     chmod +x <SKILL_DIR>/scripts/worktree-cleanup.sh
     ```

  3. Execute the script with the inputs as positional arguments:
     ```
     bash <SKILL_DIR>/scripts/worktree-cleanup.sh <JIRA_KEY> <REPO_ROOT> <SESSION_ROOT> [force]
     ```

  4. Confirm the result to the user.

  ## Output

  - A confirmation message that the worktree was removed and the registry entry deleted.

  ## Notes

  - **Cleanup is strictly local housekeeping:** the script removes only the worktree directory and the registry entry. It never merges, never pushes, and never deletes branches — the feature branch and all its commits remain in the local repository for the human to publish when ready.
  - If the worktree has uncommitted changes, the script refuses and exits non-zero. Relay the error to the user; only re-run with `force` after they explicitly confirm the changes should be discarded.
  - The session registry lives at `<SESSION_ROOT>/sessions/registry.json`.
  - The script removes the worktree via the repo recorded in the registry entry's `repo_root` field, falling back to the `REPO_ROOT` argument for older entries.
  - If the session's `worktree_path` equals the repo root (primary session), the script only deregisters the session — it never removes the repository root.

  ## Error Handling

  If the script exits non-zero, surface the full error output to the user immediately.

  Common causes of failure:
  - `JIRA_KEY` not found in registry — session may have already been cleaned up
  - `jq` not installed — fix: `brew install jq`
  - Worktree directory already manually deleted — script handles this gracefully by pruning and removing the registry entry
